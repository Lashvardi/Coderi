<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded dark bg -->
  <rect width="32" height="32" rx="8" fill="#007ACC"/>

  <!-- Letter K built from code-style shapes -->
  <!-- Vertical bar of K -->
  <rect x="9" y="7" width="3.5" height="18" rx="1.5" fill="#ffffff"/>

  <!-- Upper arm of K (angled) -->
  <rect x="12" y="7" width="3.2" height="12" rx="1.2" fill="#ffffff" transform="rotate(40, 13.5, 13)"/>

  <!-- Lower arm of K (angled) -->
  <rect x="12" y="13" width="3.2" height="12" rx="1.2" fill="#ffffff" transform="rotate(-40, 13.5, 19)"/>

  <!-- Cursor block -->
  <rect x="22" y="20" width="3" height="5" rx="0.5" fill="#4ec9b0"/>
</svg>
